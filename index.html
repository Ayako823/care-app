<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="施設記録">
<title>施設記録 転記アプリ</title>
<style>
  :root {
    --green: #3B6D11;
    --green-light: #EAF3DE;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --border: #D3D1C7;
    --text: #2C2C2A;
    --text-sub: #888780;
    --bg: #FAFAF8;
    --white: #ffffff;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 3rem; }

  .top-bar { background: var(--white); border-bottom: 1px solid var(--border); padding: 1rem 1.25rem 0.75rem; position: sticky; top: 0; z-index: 10; }
  .top-bar h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .top-bar p { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

  .container { max-width: 520px; margin: 0 auto; padding: 1rem; }

  .tab-bar { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .tab { flex: 1; padding: 10px 8px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; background: var(--white); color: var(--text-sub); text-align: center; transition: all 0.15s; user-select: none; }
  .tab.active-menu { background: var(--green-light); color: var(--green); border-color: var(--green); }
  .tab.active-care { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }

  .step-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem; margin-bottom: 0.75rem; }
  .step-header { display: flex; align-items: center; gap: 10px; margin-bottom: 0.9rem; }
  .step-num { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .step-num.menu { background: var(--green-light); color: var(--green); }
  .step-num.care { background: var(--blue-light); color: var(--blue); }
  .step-title { font-size: 15px; font-weight: 600; }
  .step-sub { font-size: 12px; color: var(--text-sub); margin-top: 1px; }

  .prompt-box { background: #F7F6F3; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 12px; color: var(--text); line-height: 1.6; white-space: pre-wrap; word-break: break-all; max-height: 130px; overflow-y: auto; }

  .how-to { background: var(--blue-light); border-radius: var(--radius-sm); padding: 0.85rem 1rem; margin-top: 0.75rem; }
  .how-to-title { font-size: 12px; font-weight: 700; color: var(--blue); margin-bottom: 6px; }
  .how-to ol { padding-left: 16px; font-size: 13px; color: var(--text); line-height: 2; }
  .how-to a { color: var(--blue); font-weight: 600; text-decoration: none; }

  .btn { width: 100%; padding: 13px; border-radius: var(--radius-sm); border: none; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 0.75rem; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; user-select: none; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .btn-green { background: var(--green); color: white; }
  .btn-blue { background: var(--blue); color: white; }

  .copied-badge { display: none; background: var(--green-light); color: var(--green); font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: var(--radius-sm); text-align: center; margin-top: 8px; }

  .json-area { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 12px; font-family: 'SF Mono', 'Menlo', monospace; color: var(--text); background: var(--white); resize: vertical; min-height: 100px; outline: none; line-height: 1.5; transition: border-color 0.15s; margin-top: 0.75rem; }
  .json-area:focus { border-color: var(--blue); }

  .status-wrap { margin-top: 0.75rem; }
  .status-row { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .status-row:last-child { border-bottom: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .dot-wait { background: var(--border); }
  .dot-ok { background: #22C55E; }
  .dot-err { background: #EF4444; }
  .status-msg { color: var(--text-sub); line-height: 1.5; }
  .status-msg b { color: var(--text); font-weight: 600; }

  .success-box { background: #F0FDF4; border: 1px solid #86EFAC; border-radius: var(--radius-sm); padding: 1rem; text-align: center; margin-top: 0.75rem; }
  .success-box .icon { font-size: 24px; margin-bottom: 4px; }
  .success-box p { font-size: 14px; font-weight: 600; color: #15803D; }
  .success-box small { font-size: 12px; color: #4ADE80; display: block; margin-top: 2px; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>施設記録 転記アプリ</h1>
  <p>Claude.ai → JSON → スプレッドシートへ転記</p>
</div>

<div class="container">

  <div class="tab-bar">
    <div class="tab active-menu" id="tabMenu" onclick="switchTab('menu')">🥗 献立表</div>
    <div class="tab" id="tabCare" onclick="switchTab('care')">📋 介護記録</div>
  </div>

  <!-- STEP 1 -->
  <div class="step-card">
    <div class="step-header">
      <div class="step-num menu" id="stepNum1">1</div>
      <div>
        <div class="step-title">プロンプトをコピー</div>
        <div class="step-sub" id="stepSub1">Claude.aiに写真と一緒に送る</div>
      </div>
    </div>
    <div class="prompt-box" id="promptBox"></div>
    <button class="btn btn-green" id="copyBtn" onclick="copyPrompt()">
      📋 プロンプトをコピー
    </button>
    <div class="copied-badge" id="copiedBadge">✓ コピーしました！Claude.aiに貼り付けて写真も添付して送信してください</div>

    <div class="how-to">
      <div class="how-to-title">操作手順</div>
      <ol>
        <li>上のボタンでプロンプトをコピー</li>
        <li><a href="https://claude.ai" target="_blank">claude.ai</a> を開く</li>
        <li>書類の写真を添付する</li>
        <li>プロンプトを貼り付けて送信</li>
        <li>返ってきたJSONをコピー</li>
      </ol>
    </div>
  </div>

  <!-- STEP 2 -->
  <div class="step-card">
    <div class="step-header">
      <div class="step-num menu" id="stepNum2">2</div>
      <div>
        <div class="step-title">JSONを貼り付けて転記</div>
        <div class="step-sub">ClaudeのJSONを貼り付けてボタンを押す</div>
      </div>
    </div>

    <textarea class="json-area" id="jsonInput" placeholder='Claudeが返したJSONをここに貼り付けてください&#10;例: {"type":"menu","rows":[...]}'></textarea>

    <button class="btn btn-green" id="sendBtn" onclick="sendToSheet()">
      🚀 スプレッドシートに転記する
    </button>

    <div class="status-wrap" id="statusWrap" style="display:none">
      <div class="status-row">
        <div class="dot" id="dot1"></div>
        <div class="status-msg" id="msg1"></div>
      </div>
      <div class="status-row">
        <div class="dot" id="dot2"></div>
        <div class="status-msg" id="msg2"></div>
      </div>
    </div>

    <div class="success-box" id="successBox" style="display:none">
      <div class="icon">✅</div>
      <p>スプレッドシートに転記しました！</p>
      <small id="successDetail"></small>
    </div>
  </div>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzoNf10EAkHlJG3mxHyTo3m3ASCQ1GOTZMniSB5Fo1G0QIydLWlj8PkFsBRjGOWAv9n/exec";
let currentTab = "menu";

const PROMPTS = {
  menu: `添付の画像は介護施設の献立表です。内容を読み取り、以下のJSON形式のみで返してください。説明文・マークダウン・コードブロックは不要です。

{"type":"menu","rows":[
  ["2026/3/30(月)","朝食内容","昼食内容","間食内容","夕食内容"],
  ["2026/3/31(火)","朝食内容","昼食内容","間食内容","夕食内容"],
  ...7日分
]}

・1列目は「年/月/日(曜日)」形式の日付
・朝食・昼食・間食・夕食の順
・料理が複数ある場合は「/」で区切る
・間食がない日は空文字
・JSONのみ返す`,

  care: `添付の画像は介護施設のケア記録一覧表です（複数ページあり）。全ページの内容を読み取り、以下のJSON形式のみで返してください。説明文・マークダウン・コードブロックは不要です。

{"type":"care","rows":[
  ["R08.03.28","00:23","夜勤者記録","就眠されており特にお変わりなし","古川 久子"],
  ...全行
]}

・日付は「R08.03.28」形式、時刻は「00:23」形式
・日付が空欄の行は直前の日付を引き継ぐ
・全ページの全記録を漏れなく含める
・JSONのみ返す`
};

function switchTab(tab) {
  currentTab = tab;
  const isMenu = tab === "menu";
  document.getElementById("tabMenu").className = "tab " + (isMenu ? "active-menu" : "");
  document.getElementById("tabCare").className = "tab " + (!isMenu ? "active-care" : "");
  ["stepNum1","stepNum2"].forEach(id => {
    document.getElementById(id).className = "step-num " + tab;
  });
  document.getElementById("stepSub1").textContent = isMenu
    ? "献立表の写真を添付して送信"
    : "ケア記録の写真（複数枚）を添付して送信";
  document.getElementById("copyBtn").className = "btn " + (isMenu ? "btn-green" : "btn-blue");
  document.getElementById("sendBtn").className = "btn " + (isMenu ? "btn-green" : "btn-blue");
  document.getElementById("promptBox").textContent = PROMPTS[tab];
  document.getElementById("copiedBadge").style.display = "none";
  document.getElementById("jsonInput").value = "";
  document.getElementById("statusWrap").style.display = "none";
  document.getElementById("successBox").style.display = "none";
}

function copyPrompt() {
  const text = PROMPTS[currentTab];
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(showCopied).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.cssText = "position:fixed;opacity:0;top:0;left:0";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
  showCopied();
}

function showCopied() {
  const badge = document.getElementById("copiedBadge");
  badge.style.display = "block";
  setTimeout(() => badge.style.display = "none", 3000);
}

function setStatus(num, state, html) {
  document.getElementById("dot" + num).className = "dot dot-" + state;
  document.getElementById("msg" + num).innerHTML = html;
}

async function sendToSheet() {
  const raw = document.getElementById("jsonInput").value.trim();
  if (!raw) { alert("JSONを貼り付けてください"); return; }

  let parsed;
  try {
    parsed = JSON.parse(raw.replace(/```json|```/g, "").trim());
  } catch(e) {
    alert("JSONの形式が正しくありません。\nClaudeの返答をそのままコピーして貼り付けてください。");
    return;
  }

  document.getElementById("statusWrap").style.display = "block";
  document.getElementById("successBox").style.display = "none";
  document.getElementById("sendBtn").disabled = true;

  const rowCount = (parsed.rows ? parsed.rows.length : 0) - 1;
  setStatus(1, "dot-ok", `<b>データ確認完了</b> — ${rowCount}件を検出`);
  setStatus(2, "dot-wait", "スプレッドシートに書き込み中...");

  try {
    await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(parsed),
      mode: "no-cors"
    });

    setStatus(2, "dot-ok", "<b>書き込み完了！</b>");
    document.getElementById("successBox").style.display = "block";
    const label = currentTab === "menu" ? "献立表" : "介護記録";
    document.getElementById("successDetail").textContent = `「${label}」シートに${rowCount}件追記しました`;
    document.getElementById("jsonInput").value = "";

  } catch(err) {
    setStatus(2, "dot-err", "エラー: " + err.message);
  }

  document.getElementById("sendBtn").disabled = false;
}

switchTab("menu");
</script>
</body>
</html>
