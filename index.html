<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="施設記録">
<title>施設記録 転記アプリ</title>
<style>
  :root {
    --green: #3B6D11;
    --green-light: #EAF3DE;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --border: #D3D1C7;
    --text: #2C2C2A;
    --text-sub: #888780;
    --bg: #FAFAF8;
    --white: #ffffff;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, 'Hiragino Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 3rem; }

  .top-bar { background: var(--white); border-bottom: 1px solid var(--border); padding: 1rem 1.25rem 0.75rem; position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; }
  .top-bar h1 { font-size: 17px; font-weight: 600; }
  .top-bar p { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
  .settings-btn { font-size: 22px; cursor: pointer; background: none; border: none; padding: 4px; }

  .container { max-width: 520px; margin: 0 auto; padding: 1rem; }

  /* API KEY SCREEN */
  .api-screen { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
  .api-screen h2 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .api-screen p { font-size: 13px; color: var(--text-sub); margin-bottom: 1rem; line-height: 1.6; }
  .api-input-wrap { position: relative; }
  .api-input { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 40px 10px 12px; font-size: 13px; font-family: monospace; color: var(--text); background: var(--white); outline: none; transition: border-color 0.15s; }
  .api-input:focus { border-color: var(--blue); }
  .toggle-eye { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text-sub); }
  .api-note { font-size: 11px; color: var(--text-sub); margin-top: 6px; }

  .tab-bar { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .tab { flex: 1; padding: 10px 8px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; background: var(--white); color: var(--text-sub); text-align: center; transition: all 0.15s; user-select: none; }
  .tab.active-menu { background: var(--green-light); color: var(--green); border-color: var(--green); }
  .tab.active-care { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }

  .step-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem; margin-bottom: 0.75rem; }
  .step-header { display: flex; align-items: center; gap: 10px; margin-bottom: 0.9rem; }
  .step-num { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .step-num.menu { background: var(--green-light); color: var(--green); }
  .step-num.care { background: var(--blue-light); color: var(--blue); }
  .step-title { font-size: 15px; font-weight: 600; }
  .step-sub { font-size: 12px; color: var(--text-sub); margin-top: 1px; }

  .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius-sm); padding: 1.5rem 1rem; text-align: center; cursor: pointer; background: #F7F6F3; position: relative; transition: all 0.15s; }
  .upload-zone.has-files { border-style: solid; background: var(--white); }
  .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 28px; margin-bottom: 6px; }
  .upload-text { font-size: 14px; color: var(--text-sub); font-weight: 500; }
  .upload-sub-text { font-size: 12px; color: var(--text-sub); margin-top: 3px; }

  .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px; }
  .preview-grid img { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }

  .btn { width: 100%; padding: 13px; border-radius: var(--radius-sm); border: none; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 0.75rem; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; user-select: none; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .btn-green { background: var(--green); color: white; }
  .btn-blue { background: var(--blue); color: white; }
  .btn-outline { background: var(--white); color: var(--text-sub); border: 1px solid var(--border); font-size: 13px; padding: 9px; margin-top: 6px; }
  .btn-save { background: var(--blue); color: white; margin-top: 0.75rem; }

  .progress-wrap { margin-top: 1rem; }
  .progress-step { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .progress-step:last-child { border-bottom: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; transition: background 0.3s; }
  .dot-wait { background: var(--border); }
  .dot-run { background: #F59E0B; }
  .dot-ok { background: #22C55E; }
  .dot-err { background: #EF4444; }
  .progress-msg { color: var(--text-sub); line-height: 1.5; }
  .progress-msg b { color: var(--text); font-weight: 600; }

  .success-box { background: #F0FDF4; border: 1px solid #86EFAC; border-radius: var(--radius-sm); padding: 1rem; text-align: center; margin-top: 0.75rem; }
  .success-box .icon { font-size: 24px; margin-bottom: 4px; }
  .success-box p { font-size: 14px; font-weight: 600; color: #15803D; }
  .success-box small { font-size: 12px; color: #4ADE80; display: block; margin-top: 2px; }

  .key-set-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--green); background: var(--green-light); padding: 3px 8px; border-radius: 999px; margin-top: 8px; }

  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>施設記録 転記アプリ</h1>
    <p>写真1枚でスプレッドシートに自動転記</p>
  </div>
  <button class="settings-btn" onclick="toggleApiScreen()" title="API Key設定">⚙️</button>
</div>

<div class="container">

  <!-- API KEY設定 -->
  <div class="api-screen" id="apiScreen">
    <h2>🔑 APIキーの設定</h2>
    <p>AnthropicのAPIキーを入力してください。このデバイスにのみ保存され、外部には送信されません。</p>
    <div class="api-input-wrap">
      <input type="password" class="api-input" id="apiKeyInput" placeholder="sk-ant-..." />
      <button class="toggle-eye" onclick="toggleKeyVisibility()">👁</button>
    </div>
    <div class="api-note">※ キーはこのブラウザにのみ保存されます</div>
    <button class="btn btn-save" onclick="saveApiKey()">保存する</button>
    <div class="key-set-badge" id="keyBadge" style="display:none">✓ APIキー設定済み</div>
  </div>

  <!-- TAB -->
  <div class="tab-bar">
    <div class="tab active-menu" id="tabMenu" onclick="switchTab('menu')">🥗 献立表</div>
    <div class="tab" id="tabCare" onclick="switchTab('care')">📋 介護記録</div>
  </div>

  <!-- STEP 1 -->
  <div class="step-card">
    <div class="step-header">
      <div class="step-num menu" id="stepNum1">1</div>
      <div>
        <div class="step-title">写真を選ぶ</div>
        <div class="step-sub" id="stepSub1">献立表の写真（1枚）</div>
      </div>
    </div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)">
      <div class="upload-icon">📷</div>
      <div class="upload-text" id="uploadText">タップして写真を選ぶ</div>
      <div class="upload-sub-text" id="uploadSubText">複数枚まとめて選べます</div>
      <div class="preview-grid" id="previewGrid"></div>
    </div>
    <button class="btn btn-outline" id="clearBtn" style="display:none" onclick="clearFiles()">写真をクリア</button>
  </div>

  <!-- STEP 2 -->
  <div class="step-card">
    <div class="step-header">
      <div class="step-num menu" id="stepNum2">2</div>
      <div>
        <div class="step-title">ボタンを押すだけ</div>
        <div class="step-sub">AIが読み取ってスプレッドシートに自動転記</div>
      </div>
    </div>

    <button class="btn btn-green" id="runBtn" onclick="runAll()" disabled>
      🚀 転記する
    </button>

    <div class="progress-wrap" id="progressWrap" style="display:none">
      <div class="progress-step">
        <div class="dot dot-wait" id="dot1"></div>
        <div class="progress-msg" id="msg1">AIが画像を読み取り中...</div>
      </div>
      <div class="progress-step">
        <div class="dot dot-wait" id="dot2"></div>
        <div class="progress-msg" id="msg2">スプレッドシートに書き込み中...</div>
      </div>
    </div>

    <div class="success-box" id="successBox" style="display:none">
      <div class="icon">✅</div>
      <p>転記完了！</p>
      <small id="successDetail"></small>
    </div>
  </div>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzoNf10EAkHlJG3mxHyTo3m3ASCQ1GOTZMniSB5Fo1G0QIydLWlj8PkFsBRjGOWAv9n/exec";
let currentTab = "menu";
let selectedFiles = [];
let apiKeyVisible = false;

const SYSTEM_PROMPTS = {
  menu: `あなたは介護施設の献立表を読み取るAIです。画像から献立表を読み取り、必ずJSON形式のみで返してください。マークダウンや説明文は一切不要です。

形式:
{"type":"menu","rows":[
  ["2026/3/30(月)","朝食内容","昼食内容","間食内容","夕食内容"],
  ["2026/3/31(火)","朝食内容","昼食内容","間食内容","夕食内容"],
  ...7日分
]}

・1列目は「年/月/日(曜日)」形式の日付
・朝食・昼食・間食・夕食の順
・料理が複数ある場合は「/」で区切る
・間食がない日は空文字
・JSONのみ返す`,

  care: `あなたは介護施設のケア記録を読み取るAIです。画像からケア記録一覧表を読み取り、必ずJSON形式のみで返してください。マークダウンや説明文は一切不要です。

形式:
{"type":"care","rows":[
  ["R08.03.28","00:23","夜勤者記録","就眠されており特にお変わりなし","古川 久子"],
  ...全行
]}

・日付は「R08.03.28」形式、時刻は「00:23」形式
・日付が空欄の行は直前の日付を引き継ぐ
・全ページの全記録を漏れなく含める
・JSONのみ返す`
};

// APIキー管理
function loadApiKey() {
  const key = localStorage.getItem("anthropic_api_key");
  if (key) {
    document.getElementById("apiKeyInput").value = key;
    document.getElementById("keyBadge").style.display = "inline-flex";
    document.getElementById("apiScreen").style.display = "none";
  }
}

function saveApiKey() {
  const key = document.getElementById("apiKeyInput").value.trim();
  if (!key || !key.startsWith("sk-ant-")) {
    alert("正しいAPIキーを入力してください（sk-ant-で始まるもの）");
    return;
  }
  localStorage.setItem("anthropic_api_key", key);
  document.getElementById("keyBadge").style.display = "inline-flex";
  document.getElementById("apiScreen").style.display = "none";
  alert("APIキーを保存しました！");
}

function toggleApiScreen() {
  const screen = document.getElementById("apiScreen");
  screen.style.display = screen.style.display === "none" ? "block" : "none";
}

function toggleKeyVisibility() {
  apiKeyVisible = !apiKeyVisible;
  document.getElementById("apiKeyInput").type = apiKeyVisible ? "text" : "password";
}

function switchTab(tab) {
  currentTab = tab;
  const isMenu = tab === "menu";
  document.getElementById("tabMenu").className = "tab " + (isMenu ? "active-menu" : "");
  document.getElementById("tabCare").className = "tab " + (!isMenu ? "active-care" : "");
  ["stepNum1","stepNum2"].forEach(id => {
    document.getElementById(id).className = "step-num " + tab;
  });
  document.getElementById("stepSub1").textContent = isMenu
    ? "献立表の写真（1枚）"
    : "ケア記録の写真（複数枚OK）";
  document.getElementById("runBtn").className = "btn " + (isMenu ? "btn-green" : "btn-blue");
  clearFiles();
}

function handleFiles(files) {
  selectedFiles = Array.from(files);
  const grid = document.getElementById("previewGrid");
  grid.innerHTML = "";
  selectedFiles.forEach(f => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(f);
    grid.appendChild(img);
  });
  document.getElementById("uploadText").textContent = selectedFiles.length + "枚 選択済み";
  document.getElementById("uploadSubText").textContent = "タップして変更";
  document.getElementById("uploadZone").classList.add("has-files");
  document.getElementById("clearBtn").style.display = "block";
  document.getElementById("runBtn").disabled = false;
  document.getElementById("progressWrap").style.display = "none";
  document.getElementById("successBox").style.display = "none";
}

function clearFiles() {
  selectedFiles = [];
  document.getElementById("previewGrid").innerHTML = "";
  document.getElementById("uploadText").textContent = "タップして写真を選ぶ";
  document.getElementById("uploadSubText").textContent = "複数枚まとめて選べます";
  document.getElementById("uploadZone").classList.remove("has-files");
  document.getElementById("clearBtn").style.display = "none";
  document.getElementById("runBtn").disabled = true;
  document.getElementById("progressWrap").style.display = "none";
  document.getElementById("successBox").style.display = "none";
  document.getElementById("fileInput").value = "";
}

function setDot(num, state, html) {
  document.getElementById("dot" + num).className = "dot dot-" + state;
  if (html) document.getElementById("msg" + num).innerHTML = html;
}

async function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("読み込み失敗"));
    r.readAsDataURL(file);
  });
}

async function runAll() {
  const apiKey = localStorage.getItem("anthropic_api_key");
  if (!apiKey) {
    alert("まずAPIキーを設定してください（右上の⚙️ボタン）");
    document.getElementById("apiScreen").style.display = "block";
    return;
  }
  if (selectedFiles.length === 0) return;

  document.getElementById("runBtn").disabled = true;
  document.getElementById("runBtn").innerHTML = '<span class="spinner"></span> 処理中...';
  document.getElementById("progressWrap").style.display = "block";
  document.getElementById("successBox").style.display = "none";

  setDot(1, "run", "AIが画像を読み取り中...");
  setDot(2, "wait", "スプレッドシートに書き込み中...");

  try {
    const imageContents = await Promise.all(selectedFiles.map(async f => ({
      type: "image",
      source: { type: "base64", media_type: f.type || "image/jpeg", data: await fileToBase64(f) }
    })));

    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-allow-browser": "true"
      },
      body: JSON.stringify({
        model: "claude-opus-4-5",
        max_tokens: 4000,
        system: SYSTEM_PROMPTS[currentTab],
        messages: [{ role: "user", content: [...imageContents, { type: "text", text: "この画像の内容をJSONで返してください。" }] }]
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || "APIエラー");

    const rawText = data.content.map(c => c.text || "").join("").trim().replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(rawText);
    const rowCount = parsed.rows ? parsed.rows.length : 0;

    setDot(1, "ok", `<b>読み取り完了</b> — ${rowCount}件のデータを検出`);
    setDot(2, "run", "スプレッドシートに書き込み中...");

    await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(parsed),
      mode: "no-cors"
    });

    setDot(2, "ok", "<b>書き込み完了！</b>");
    document.getElementById("successBox").style.display = "block";
    const label = currentTab === "menu" ? "献立表" : "介護記録";
    document.getElementById("successDetail").textContent = `「${label}」シートに${rowCount}件追記しました`;
    clearFiles();

  } catch(err) {
    setDot(1, "err", "<b>エラー:</b> " + err.message);
    setDot(2, "wait", "スキップ");
  }

  document.getElementById("runBtn").disabled = false;
  document.getElementById("runBtn").innerHTML = "🚀 転記する";
}

// 初期化
loadApiKey();
switchTab("menu");
</script>
</body>
</html>
